openapi: 3.0.0
info:
  title: User Service API
  version: 1.0.0
  description: API documentation for User Microservice

servers:
  - url: http://localhost:8080

paths:
  /api/users/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                name: Anuja
                email: anuja@gmail.com
                password: 123456
      responses:
        201:
          description: User created

  /api/users/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                email: anuja@gmail.com
                password: 123456
      responses:
        200:
          description: JWT token returned

  /api/users:
    get:
      summary: Get all users
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of users

  /api/users/{id}:
    get:
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User data

  /api/users/{id}/bookings:
    get:
      summary: Get user bookings
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User bookings

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT